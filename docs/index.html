<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobRadar — Vagas Tech</title>
    <link rel="stylesheet" href="style.css?v=20260516-pages2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📡</text></svg>">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-eyebrow">Atualizado diariamente</div>
            <h1>JobRadar</h1>
            <p>Vagas tech curadas de múltiplas fontes em um só lugar</p>
            <div class="header-actions">
                <div id="auth-section">
                    <button id="btn-login" class="btn-outline">
                        <i class="fab fa-google"></i> Entrar com Google
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="filters-wrapper">
            <div class="filter-input-wrapper">
                <i class="fas fa-code"></i>
                <input type="text" id="filter-tech" placeholder="Tecnologia (ex: python, react...)" />
            </div>
            <div class="filter-input-wrapper">
                <i class="fas fa-map-marker-alt"></i>
                <input type="text" id="filter-location" placeholder="Localização (ex: London, UK...)" />
            </div>
            <button id="btn-search" class="btn-primary">
                <i class="fas fa-search"></i> Buscar
            </button>
        </div>

        <div id="jobs-grid" class="jobs-grid">
            <div class="loading">
                <i class="fas fa-circle-notch fa-spin"></i>
                <p>Carregando vagas...</p>
            </div>
        </div>

        <div id="favorites-section" style="display:none">
            <h2><i class="fas fa-star"></i> Meus Favoritos</h2>
            <div id="favorites-grid" class="jobs-grid"></div>
        </div>
    </main>

    <footer>
        <p>Desenvolvido por <strong>Everton L. de Souza</strong> &copy; 2026</p>
    </footer>

    <script src="script.js?v=20260516-pages2"></script>
</body>
</html>
